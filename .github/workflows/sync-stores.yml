name: Sync Joie BeLux Stores

permissions:
  contents: write

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch Google Sheet and update JSON files
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python << 'EOF'
          import pandas as pd
          import json
          import os

          sheet_id = os.environ.get("GOOGLE_SHEET_ID")
          sheet_name = "Stores"

          if not sheet_id:
              raise ValueError("GOOGLE_SHEET_ID secret ontbreekt")

          url = f"https://docs.google.com/spreadsheets/d/{sheet_id}/gviz/tq?tqx=out:csv&sheet={sheet_name}"

          df = pd.read_csv(url)
          df = df.fillna("")

          stores = df.to_dict(orient="records")

          with open("stores.json", "w", encoding="utf-8") as f:
              json.dump(stores, f, ensure_ascii=False, indent=2)

          with open("stores-nl.json", "w", encoding="utf-8") as f:
              json.dump(stores, f, ensure_ascii=False, indent=2)

          with open("stores-fr.json", "w", encoding="utf-8") as f:
              json.dump(stores, f, ensure_ascii=False, indent=2)

          print(f"✓ {len(stores)} winkels gesynchroniseerd")
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add stores.json stores-nl.json stores-fr.json

          if git diff --staged --quiet; then
            echo "Geen wijzigingen om te committen"
          else
            git commit -m "Auto-sync stores from Google Sheet"
            git push
          fi
